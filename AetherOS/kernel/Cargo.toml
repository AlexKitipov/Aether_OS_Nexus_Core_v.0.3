[package]
name = "aetheros-kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
common = { package = "aetheros-common", path = "../common" }
bootloader_api = { version = "0.11.2" }
bootloader = { workspace = true }
x86_64 = { version = "0.14.9", default-features = false, features = ["instructions", "step_trait"] }
spin = "0.9.8"
linked_list_allocator = "0.10.1"
conquer-once = "0.4.0"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[features]
default = []
bare_metal = []

[package.metadata.bootimage]
run-command = [
  "qemu-system-x86_64",
  "-machine", "q35",
  "-m", "2G",
  "-serial", "stdio",
  "-drive", "format=raw,file={}"
]
